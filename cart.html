<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROUNZ - Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined&family=Material+Icons&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="CSS/common.css">
  <link rel="stylesheet" href="CSS/cart.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
</head>

<body>

  <div class="cart-page">
    <!-- 상단 고정 헤더 (메뉴, 로고, 마이페이지 아이콘 영역) -->
    <header class="header cart-topbar">
      <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <button class="menu-btn material-symbols-outlined">menu</button>
        <h1 class="logo">ROUNZ</h1>
        <nav class="icon-menu">
          <a href="#" class="material-symbols-outlined">person</a>
          <a href="#" class="material-symbols-outlined">search</a>
          <a href="#" class="material-symbols-outlined">shopping_bag</a>
        </nav>
      </div>
    </header>

    <!-- 본문 내용 (장바구니 리스트, 추천상품, 결제금액 요약 영역) -->
    <main>

      <!-- 페이지 이동 경로 (Breadcrumb) 표시 영역 -->
      <nav class="cart-breadcrumb" aria-label="Breadcrumb">
        <div class="container" style="display: flex; gap: 8px;">
          <a href="index.html">HOME</a>
          <span>&gt;</span>
          <strong>CART</strong>
        </div>
      </nav>

      <!-- 장바구니 PC 레이아웃용 래퍼 -->
      <div class="container">
        <div class="cart-layout">
          <!-- 좌측 영역 -->
          <div class="cart-left">
            <!-- 장바구니 제목 및 전체선택 체크박스 컨트롤 영역 -->
            <section class="cart-title-section" aria-labelledby="cart-title">

              <div>
                <h2 id="cart-title">
                  장바구니 <span id="cart-count">(0)</span>
                </h2>
              </div>

              <label class="checkbox-label" aria-label="전체상품 선택">
                <input type="checkbox" id="selectAll">
                <span class="checkmark"></span>
                <span>전체선택</span>
              </label>
            </section>

            <!-- 실제 장바구니에 담긴 상품 리스트가 렌더링되는 영역 (JS에서 동적 생성) -->
            <section class="cart-items" aria-label="Cart items">
            </section>

            <!-- 장바구니 하단에 보여지는 함께 보면 좋을 추천 상품 슬라이더 영역 -->
            <section class="recommendations" aria-labelledby="recommendation-title">

              <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h3 class="section-title" id="recommendation-title">
                  추천 상품
                </h3>
                <div class="slider-nav">
                  <button type="button" class="slider-btn" aria-label="이전"><span
                      class="material-symbols-outlined">chevron_left</span></button>
                  <button type="button" class="slider-btn" aria-label="다음"><span
                      class="material-symbols-outlined">chevron_right</span></button>
                </div>
              </div>

              <div class="card-slider rec-slider"></div>
            </section>

          </div> <!-- end cart-left -->

          <!-- 우측 영역 -->
          <div class="cart-right">
            <!-- 총 상품 금액, 배송비, 총 합계를 보여주는 주문 요약 영역 -->
            <section class="order-summary" aria-labelledby="summary-title">

              <h3 class="section-title" id="summary-title">
                주문 요약
              </h3>

              <div class="summary-row">
                <span id="subtotal-label">소계 (0 개)</span>
                <strong id="total-product-price">0원</strong>
              </div>

              <div class="summary-row">
                <span>배송비</span>
                <strong id="shipping-price">무료</strong>
              </div>

              <div class="summary-row">
                <span>세금</span>
                <strong id="tax-price">0 원</strong>
              </div>

              <div class="summary-divider"></div>

              <div class="summary-row total">
                <span>총합계</span>
                <strong id="total-price" class="text-blue">0 원</strong>
              </div>

              <!-- 화면 하단에 항상 고정되는 '결제' 버튼 영역 (PC에서는 우측 하단 고정) -->
              <div class="sticky-footer-btn">
                <button class="order-btn btn-blue" type="button">
                  <span>결제 진행하기</span>
                  <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
                </button>
              </div>

              <div class="secure-checkout-text">
                안전 결제 시스템, 30일 이내 반품 가능
              </div>

              <div class="shipping-notice-box">
                <span class="material-symbols-outlined notice-icon">info</span>
                <p>무료배송은 5만원부터<br>가능합니다. 주문 내역을<br>확인해주세요!</p>
              </div>

            </section>

          </div> <!-- end cart-right -->
        </div> <!-- end cart-layout -->
      </div> <!-- end container -->

    </main>

    <!-- 페이지 최하단 카피라이트 및 공통 푸터 정보 영역 -->

    <footer class="sub-footer">
    </footer>

  </div>

  <script src="JS/utils/common.js"></script>
  <script type="module" src="JS/utils/cart.js"></script>

</body>

</html>
