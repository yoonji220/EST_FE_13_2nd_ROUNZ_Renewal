<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 | ROUNZ</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined&family=Material+Icons&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/common.css" />
    <link rel="stylesheet" href="./css/new-account.css" />
  </head>
  <body>
    <header class="header"></header>
    <main class="sub-page">
      <div class="main-content container d-flex g-5 justify-content-center align-items-center">
        <img
          src="./img/Rounz-ad.jpg"
          alt="가상피팅으로 최신 유행하는 선글라스/안경 써보는 라운즈 출시"
          class="pc-only"
        />

        <section class="container d-flex flex-column justify-content-center g-2">
          <div class="title d-flex flex-column g-2">
            <h1 class="typo-m-header-l">회원가입</h1>
            <p class="typo-m-body">
              ROUNZ에 가입하고 AI 기반의 맞춤형 안경 추천과 <br />가상 피팅 서비스를 경험해보세요.
            </p>
          </div>
          <form action="#" novalidate class="d-flex flex-column g-2">
            <div class="field d-flex flex-column g-1">
              <label class="typo-m-header" for="useremail">이메일</label>
              <div class="form d-flex g-1">
                <input type="email" id="useremail" class="typo-m-body" placeholder="email@example.com" required />
                <button type="button" id="validate" class="typo-m-btn-s" aria-label="이메일 인증요청 버튼" >인증요청</button>
              </div>
              <span class="feedback typo-m-caption"></span>
            </div>

            <div class="field d-flex flex-column g-1">
              <label for="validate_number" class="typo-m-header">인증번호</label>
              <input type="number" id="validate_number" class="typo-m-body" placeholder="6자리 숫자 입력" required />
              <span class="feedback typo-m-caption">인증번호를 입력해주세요.</span>
              
            </div>

            <div class="field d-flex flex-column g-1">
              <label for="userpw" class="typo-m-header">비빌번호</label>
              <input
                type="password"
                id="userpw"
                class="typo-m-body"
                placeholder="영문,숫자,특수문자 조합 8자 이상"
                required
              />
              <span class="feedback typo-m-caption">안전한 비밀번호를 입력해 주세요.</span>
            </div>

            <div class="field d-flex flex-column g-1">
              <label for="userpwc" class="typo-m-header">비빌번호 확인</label>
              <input type="password" id="userpwc" class="typo-m-body" placeholder="비밀번호 재입력" required />
              <span class="feedback typo-m-caption"></span>
            </div>

            <div class="field d-flex flex-column g-1">
              <label for="username" class="typo-m-header">이름</label>
              <input type="text" id="username" class="typo-m-body" placeholder="실명을 입력해주세요" required />
              <span class="feedback typo-m-caption"></span>
            </div>

            <div class="d-flex g-2">
              <input type="checkbox" id="allagree" />
              <label for="allagree" class="typo-m-body">[전체 동의]</label>
            </div>

            <div class="d-flex justify-content-between">
              <div class="d-flex g-2">
                <input type="checkbox" id="tosagree" required />
                <label for="tosagree" class="typo-m-body">[필수] 이용약관</label>
                <span class="feedback typo-m-caption"></span>
              </div>
              <span class="typo-m-icons-xs-o">chevron_right</span>
            </div>

            <div class="d-flex justify-content-between">
              <div class="d-flex g-2">
                <input type="checkbox" id="ppagree" required />
                <label for="ppagree" class="typo-m-body">[필수] 개인정보 처리 방침</label>
                <span class="feedback typo-m-caption"></span>
              </div>
              <span class="typo-m-icons-xs-o">chevron_right</span>
            </div>

            <div class="d-flex justify-content-between">
              <div class="d-flex g-2">
                <input type="checkbox" id="adagree" />
                <label for="adagree" class="typo-m-body">[선택] 마케팅 정보 수신</label>
              </div>
              <span class="typo-m-icons-xs-o">chevron_right</span>
            </div>

            <button type="submit" class=" align-items-center typo-m-btn-s account-make">가입하기</button>
          </form>

          <hr class="container" />
          <div class="d-flex justify-content-center g-1">
            <p class="typo-m-body-s">이미 계정이 있으신가요?</p>
            <a href="login.html" class="typo-m-body-s">로그인</a>
          </div>
        </section>
      </div>
    </main>
    <footer class="footer"></footer>

    <script type="module">
      import { renderHeader } from "./js/modules/header.js";
      import { renderFooter } from "./js/modules/footer.js";
      renderHeader();
      renderFooter(true);
    </script>
    <script src="js/new-account.js"></script>
    <script src="js/utils/common.js"></script>
  </body>
</html>
