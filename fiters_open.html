<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROUNZ - Filters Open</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined&family=Material+Icons&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/filters_open.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0" />
</head>

<body>
  <div class="app-container filters-open-page">
    <!-- Header -->
    <header class="modal-header">
      <div style="width: 24px;"></div> <!-- Spacer for center alignment -->
      <h1 class="modal-title">필터</h1>
      <button class="icon-btn close-btn" aria-label="Close" onclick="window.history.back()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <main class="filter-main-content">
      <!-- Brand Section -->
      <section class="filter-block">
        <h2 class="filter-heading">브랜드</h2>
        <div class="brand-grid">
          <button class="brand-btn active">라운즈 (ROUNZ)</button>
          <button class="brand-btn">젠틀몬스터</button>
          <button class="brand-btn">레이밴</button>
          <button class="brand-btn">GENTLE MONSTER</button>
          <button class="brand-btn">Ray-Ban</button>
          <button class="brand-btn">TOM FORD</button>
        </div>
      </section>

      <!-- =========================
     프레임 형태
========================= -->
      <section class="filter-section">

        <h3 class="filter-title">
          프레임형태
        </h3>

        <div class="shape-grid">

          <!-- 라운드 -->
          <button class="shape-card">

            <span class="shape-icon-wrapper">
              <img src="./img/filters_img/peuleim/1.round.png" alt="라운드">
            </span>

            <span class="shape-name">
              라운드
            </span>

          </button>

          <!-- 보스턴 -->
          <button class="shape-card">

            <span class="shape-icon-wrapper">
              <img src="./img/filters_img/peuleim/2.Boston.png" alt="보스턴">
            </span>

            <span class="shape-name">
              보스턴
            </span>

          </button>

          <!-- 보잉 -->
          <button class="shape-card">

            <span class="shape-icon-wrapper">
              <img src="./img/filters_img/peuleim/3.boeing.png" alt="보잉">
            </span>

            <span class="shape-name">
              보잉
            </span>

          </button>

          <!-- 스퀘어 -->
          <button class="shape-card">

            <span class="shape-icon-wrapper">
              <img src="./img/filters_img/peuleim/4.square.png" alt="스퀘어">
            </span>

            <span class="shape-name">
              스퀘어
            </span>

          </button>

        </div>

      </section>
      <!-- Face Shape Section -->
      <section class="filter-block">
        <div class="face-shape-header">
          <h2 class="filter-heading" style="margin-bottom: 0;">얼굴형</h2>

          <button class="ai-analysis-btn">
            <span class="material-symbols-outlined" style="font-size: 14px;">psychology</span>
            AI 얼굴 분석
          </button>
        </div>

        <div class="face-shape-grid">

          <div class="face-shape-item" data-shape="round">
            <div class="shape-icon-wrapper">
              <img src="img/filters_img/face_img/1.round.png" data-default="img/filters_img/face_img/1.round.png"
                data-active="img/filters_img/face_img/1.c-round.png" alt="둥근형">
            </div>
            <span>둥근형</span>
          </div>

          <div class="face-shape-item" data-shape="square">
            <div class="shape-icon-wrapper">
              <img src="img/filters_img/face_img/2.oval.png" data-default="img/filters_img/face_img/2.oval.png"
                data-active="img/filters_img/face_img/2.c-oval.png" alt="달걀형">
            </div>
            <span>달걀형</span>
          </div>

          <div class="face-shape-item" data-shape="oblong">
            <div class="shape-icon-wrapper">
              <img src="img/filters_img/face_img/3.oblong.png" data-default="img/filters_img/face_img/3.oblong.png"
                data-active="img/filters_img/face_img/3.c-oblong.png" alt="긴얼굴형">
            </div>
            <span>긴얼굴형</span>
          </div>

          <div class="face-shape-item" data-shape="square2">
            <div class="shape-icon-wrapper">
              <img src="img/filters_img/face_img/4.square.png" data-default="img/filters_img/face_img/4.square.png"
                data-active="img/filters_img/face_img/4.c-square.png" alt="각진형">
            </div>
            <span>각진형</span>
          </div>

          <div class="face-shape-item" data-shape="heart">
            <div class="shape-icon-wrapper">
              <img src="img/filters_img/face_img/5.heart.png" data-default="img/filters_img/face_img/5.heart.png"
                data-active="img/filters_img/face_img/5.c-heart.png" alt="하트형">
            </div>
            <span>하트형</span>
          </div>

          <div class="face-shape-item" data-shape="long">
            <div class="shape-icon-wrapper">
              <img src="img/filters_img/face_img/6.inverted-triangle.png"
                data-default="img/filters_img/face_img/6.inverted-triangle.png"
                data-active="img/filters_img/face_img/6.c-inverted-triangle.png" alt="역삼각형">
            </div>
            <span>역삼각형</span>
          </div>

        </div>
      </section>

      <!-- Material Section -->
      <section class="filter-block">
        <h2 class="filter-heading">소재</h2>
        <div class="material-grid">
          <button class="material-btn active">티타늄</button>
          <button class="material-btn">뿔테</button>
          <button class="material-btn">나무</button>
          <button class="material-btn">아세테이트</button>
          <button class="material-btn">메탈</button>
          <button class="material-btn">무테/반무테</button>
          <button class="material-btn">스테인리스</button>
          <button class="material-btn">TR</button>
          <button class="material-btn">울템</button>
        </div>
      </section>

      <!-- Price Section -->
      <section class="filter-block">
        <h2 class="filter-heading">가격</h2>
        <div class="dual-slider-wrapper">
          <div class="dual-slider-container">
            <div class="slider-track"></div>
            <div class="slider-range" id="sliderRange"></div>
            <input type="range" min="0" max="4" value="0" step="1" class="thumb thumb-min" id="priceMin">
            <input type="range" min="0" max="4" value="1" step="1" class="thumb thumb-max" id="priceMax">
          </div>
          <div class="slider-labels" id="sliderLabels">
            <span data-index="0">0원</span>
            <span data-index="1">10만원</span>
            <span data-index="2">20만원</span>
            <span data-index="3">30만원</span>
            <span data-index="4">200만원</span>
          </div>
        </div>
      </section>
    </main>

    <!-- Bottom Actions -->
    <div class="filter-bottom-actions">
      <button class="btn-reset" onclick="window.location.reload()">
        <span class="material-symbols-outlined" style="font-size: 16px;">refresh</span>
        초기화
      </button>
      <button class="btn-apply" onclick="window.history.back()">필터적용</button>
    </div>
  </div>
  <script src="./js/utils/common.js"></script>
  <script src="JS/utils/filters-open.js"></script>
</body>

</html>
