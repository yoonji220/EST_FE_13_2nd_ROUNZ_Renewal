<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROUNZ - Filters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Material+Symbols+Outlined&family=Material+Icons&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/filters.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0">
</head>

<body>
  <div class="filters-page">
    <!-- 상단 고정 헤더 (메뉴, 로고, 마이페이지 아이콘 영역) -->
    <header class="header cart-topbar">
      <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <button class="menu-btn material-symbols-outlined">menu</button>
        <h1 class="logo">ROUNZ</h1>
        <nav class="icon-menu">
          <a href="#" class="material-symbols-outlined">person</a>
          <a href="#" class="material-symbols-outlined">search</a>
          <a href="#" class="material-symbols-outlined">shopping_bag</a>
        </nav>
      </div>
    </header>
    <!-- 상품 리스트 및 필터 조작 메인 영역 -->
    <main class="filters-main">
      <!-- 페이지 이동 경로 (Breadcrumb) 영역 -->
      <nav class="filters-breadcrumb" aria-label="Breadcrumb">
        <div class="container" style="display: flex; gap: 8px;">
          <a href="index.html">HOME</a>
          <span>&gt;</span>
          <a href="#">GLASSES</a>
          <span>&gt;</span>
          <strong>PRODUCT DETAIL</strong>
        </div>
      </nav>

      <!-- PC 레이아웃용 래퍼 -->
      <div class="container">
        <!-- 상세 필터 팝업 열기 버튼 (모바일용) -->
        <!-- FILTERS 버튼: 클릭 시 fiters_open.html로 이동 -->
        <a class="filter-bar" id="filter-toggle" href="fiters_open.html" aria-label="필터 열기">
          <span class="filter-title">
            <span class="material-symbols-outlined">sort</span>
            FILTERS
          </span>
          <span class="material-symbols-outlined" id="filter-toggle-icon">expand_more</span>
        </a>

        <!-- 종류 필터 (Sunglasses, Glasses만) -->
        <section class="filter-panel" id="filter-panel" aria-label="Filters">
          <div class="filter-row" data-selection-group>
            <span>종류</span>
            <button class="selected" data-filter-option data-category="sunglasses" type="button">Sunglasses</button>
            <button data-filter-option data-category="glasses" type="button">Glasses</button>
          </div>
        </section>

        <div class="product-layout">

          <!-- 좌측 필터 사이드바 -->
          <aside class="filter-sidebar">
            <h2 class="sidebar-title">필터<br><span class="sidebar-subtitle">원하는 스타일을 찾아보세요</span></h2>

            <div class="search-box">
              <span class="material-symbols-outlined">search</span>
              <input type="text" placeholder="모델명 또는 브랜드 검색">
            </div>

            <div class="filter-accordion">
              <details open>
                <summary>브랜드 <span class="material-symbols-outlined">expand_more</span></summary>
                <div class="accordion-content">
                  <!-- 브랜드 리스트 (체크박스 형태) -->
                </div>
              </details>

              <details open>
                <summary>프레임 형태 <span class="material-symbols-outlined">expand_more</span></summary>
                <div class="accordion-content">
                  <label><input type="checkbox"> 스퀘어</label>
                  <label><input type="checkbox"> 라운드</label>
                  <label><input type="checkbox"> 보잉</label>
                  <label><input type="checkbox"> 캣 아이</label>
                </div>
              </details>

              <details>
                <summary>소재 <span class="material-symbols-outlined">expand_more</span></summary>
              </details>

              <details>
                <summary>컬러 <span class="material-symbols-outlined">expand_more</span></summary>
              </details>

              <details open>
                <summary>가격 <span class="material-symbols-outlined">expand_more</span></summary>
                <div class="accordion-content">
                  <label><input type="checkbox"> 10만원 이하</label>
                  <label><input type="checkbox"> 10-20만원</label>
                  <label><input type="checkbox"> 20-30만원</label>
                  <label><input type="checkbox"> 30만원 이상</label>
                </div>
              </details>

              <details open>
                <summary>사이즈 <span class="material-symbols-outlined">expand_more</span></summary>
                <div class="accordion-content">
                  <label><input type="checkbox"> S</label>
                  <label><input type="checkbox"> M</label>
                  <label><input type="checkbox"> L</label>
                </div>
              </details>
            </div>

            <div class="selected-tags">
              <span class="tags-label">현재 선택</span>
              <div class="tags-list">
                <span class="tag">스퀘어 <button><span class="material-symbols-outlined">close</span></button></span>
                <span class="tag">티타늄 <button><span class="material-symbols-outlined">close</span></button></span>
              </div>
            </div>
          </aside>

          <!-- 우측 상품 영역 -->
          <div class="product-content">

            <div class="product-content-header">
              <div>
                <h2 class="content-count">전체 아이웨어</h2>
                <span class="content-count">1,245개의 제품이 검색되었습니다</span>
              </div>

              <div class="sort-dropdown" style="position: relative;">
                <span>정렬 기준 :</span>
                <button id="sort-toggle" type="button" aria-expanded="false">
                  <strong id="sort-current">신상품순</strong>
                  <span class="material-symbols-outlined">expand_more</span>
                </button>
                <!-- 정렬 옵션 목록 (JS가 동적으로 채워줌) -->
                <div class="sort-options" id="sort-options" hidden>
                  <button class="sort-option active" data-sort-option type="button">신상품순</button>
                  <button class="sort-option" data-sort-option type="button">인기순</button>
                  <button class="sort-option" data-sort-option type="button">낮은가격순</button>
                  <button class="sort-option" data-sort-option type="button">높은가격순</button>
                </div>
              </div>
            </div>

            <!-- 필터링된 실제 상품들이 격자(Grid) 형태로 렌더링되는 영역 -->
            <section class="product-grid" id="product-grid" aria-label="Products"></section>

            <!-- 하단 상품 추가 로드 '더 보기' 버튼 영역 -->
            <div class="view-more-wrap" id="view-more-wrap">
              <button class="view-more-btn btn-dark" id="view-more-btn" type="button">더 보기</button>
            </div>

          </div> <!-- end product-content -->
        </div> <!-- end product-layout -->
      </div> <!-- end container -->
    </main>

    <!-- 페이지 하단 카피라이트 및 공통 푸터 정보 영역 -->
    <footer class="sub-footer"></footer>
  </div>

  <script src="./js/utils/common.js"></script>
  <script type="module" src="./js/utils/filters.js"></script>
</body>

</html>
